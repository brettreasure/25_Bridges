  <link rel="stylesheet" href="css/style.css">

<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">
        <img src="assets/logo-white.svg" alt="25 Bridges" class="nav-logo">
      </a>
      <ul class="nav-links" id="nav-links">

  <main>
    <div class="page">

      <header class="page-hero">
        <span class="mono">Gallery</span>
        <h1>The <em>community.</em></h1>
        <p>Photographs from Mizoram, India — the camps, the people, and daily life.</p>
      </header>

      <section class="section">
        <div class="gallery-grid">
          <img src="images/gallery-weaving.jpg" alt="Women weaving traditional fabric on a loom, Mizoram">
          <img src="images/gallery-students.jpg" alt="Group of students, Mizoram">
          <img src="images/gallery-campfire.jpg" alt="Family gathered around a campfire outside their shelter, Mizoram">
          <img src="images/gallery-sewing.jpg" alt="Women at sewing machines in a community workshop, Mizoram">

          <img src="images/gallery-kitchen.jpg" alt="Camp kitchen with open fire, Mizoram">

          <img src="images/gallery-umbrella.png" alt="Child walking with a pink umbrella on a muddy path">
          <img src="images/gallery-bazar.png" alt="Chanmari Bazar market scene, Mizoram">
          <img src="images/gallery-village.png" alt="Hill town panorama, Mizoram">

    toggle.addEventListener('click', () => {

      toggle.setAttribute('aria-expanded', open);
    });
